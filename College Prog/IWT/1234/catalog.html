<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,
initial-scale=1.0">
<title>Catalog Page</title>
<style>
body {
font-family: 'Times New Roman', Georgia;
margin: 0;
padding: 0;
background-image: url('mu.jpeg');
background-size: cover;
background-position: center;
background-repeat: no-repeat;
background-attachment: fixed;
}
header {
font-family: 'Times New Roman', Georgia;
background-color: #780C28;
color: #ffffff;
padding: 10px;
text-align: center;
}
.container {
display: grid;
grid-template-columns: repeat(auto-fill,
minmax(200px, 1fr));
gap: 16px;
padding: 16px;
}
.item {
background-color: #F0A04B;
border: 1px solid #780C28;
border-radius: 5px;
padding: 16px;
text-align: center;
}
.item img {
max-width: 50%;
height: auto;
border: 1px solid #ffffff;
margin-bottom: 16px;
}
footer {
font-family: 'Times New Roman', Georgia;
background: #F0A04B;
color: #780C28;
padding: 5px;
text-align: center;
position: fixed;
bottom: 1px;
width: 100%;
}
</style>
</head>
<body>
<header>
<h1>CATALOG</h1>
</header>
<center>
<div class="container">
<div class="item">
<img src="cata1.jpg" alt="The Great Gatsby">
<h2>The Great Gatsby</h2>
<h3>Novel By: Scott Fitzgerald</h3>
</div>
<div class="item">
<img src="cata2.jpg" alt="Rich Dad Poor Dad">
<h2>Rich Dad Poor Dad</h2>
<h3>Novel By: Robert.T</h3>
</div>
<div class="item">
<img src="cata3.jpg" alt="Jane Eyre">
<h2>Jane Eyre</h2>
<h3>Novel By: Jane Eyre</h3>
</div>
<div class="item">
<img src="cata4.jpg" alt="Wuthering heights">
<h2>Wuthering heights</h2>
<h3>Novel By: Emily Bronte</h3>
</div>
<div class="item">
<img src="cata5.jpg" alt="Catch-22">
<h2>Catch-22</h2>
<h3>Novel By: Joseph Heller</h3>
</div>
</center>
</div>
<footer>
<p>&copy;medicaps.ac.in</p>
</footer>
</body>
</html>
